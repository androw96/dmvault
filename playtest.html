<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paladin's Vault • Playtest Sandbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css?v=20260520d">
</head>
<body data-page="playtest">
  <div class="page-shell">
    <main class="page-stack">
      <section class="panel playtest-board-panel playtest-board-panel-clean">
        <p class="hero-text playtest-inline-status" data-status></p>
        <div id="playtest-empty" class="playtest-empty-state" hidden>
          <p class="hero-text">Open a deck from the builder, then press <strong>Playtest</strong> to send it into the sandbox.</p>
        </div>

        <div id="playtest-board" class="playtest-table">
          <section class="playtest-battlefield-shell">
            <div class="playtest-battlefield-header">
              <span class="playtest-battlefield-meta">Turn <strong id="playtest-turn-value">1</strong></span>
            </div>

            <div class="playtest-battlefield">
              <div class="playtest-battlefield-grid"></div>

              <section class="playtest-shield-strip">
                <div class="playtest-inline-zone-header">
                  <span>Shields</span>
                </div>
                <div id="playtest-shields-zone" class="playtest-inline-card-row playtest-inline-card-row-shields"></div>
              </section>

              <section class="playtest-battle-zone-shell">
                <div class="playtest-inline-zone-header">
                  <span>Battle Zone</span>
                </div>
                <div id="playtest-battle-zone" class="playtest-card-grid playtest-card-grid-battle"></div>
              </section>

              <section class="playtest-mana-zone-shell">
                <div class="playtest-inline-zone-header">
                  <span>Mana Zone</span>
                </div>
                <div id="playtest-mana-zone" class="playtest-inline-card-row"></div>
              </section>
            </div>
          </section>

          <aside class="playtest-sidebar">
            <button id="playtest-reset-button" type="button" class="playtest-side-button">Restart</button>
            <button id="playtest-shuffle-button" type="button" class="playtest-side-button">Shuffle</button>
            <button id="playtest-draw-button" type="button" class="playtest-side-button">Draw</button>
            <div class="playtest-turn-panel">
              <span>Set turn</span>
              <div class="playtest-turn-actions">
                <input id="playtest-turn-input" type="number" min="1" step="1" class="field-input playtest-turn-input" value="1">
                <button id="playtest-turn-inc" type="button" class="playtest-side-button playtest-side-button-primary">Next Turn</button>
              </div>
            </div>
          </aside>

          <section class="playtest-bottom-rail">
            <div class="playtest-hand-shell">
              <div class="playtest-inline-zone-header">
                <span>Hand</span>
              </div>
              <div id="playtest-hand-zone" class="playtest-inline-card-row playtest-inline-card-row-hand"></div>
            </div>

            <div class="playtest-side-zones">
              <section class="playtest-pile-shell">
                <div class="playtest-inline-zone-header">
                  <span>Library</span>
                </div>
                <div id="playtest-draw-pile-zone" class="playtest-pile-zone"></div>
              </section>

              <section class="playtest-pile-shell">
                <div class="playtest-inline-zone-header">
                  <span>Graveyard</span>
                </div>
                <div id="playtest-graveyard-zone" class="playtest-mini-zone"></div>
              </section>
            </div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <div id="auth-modal" class="modal-shell" hidden>
    <div class="modal-backdrop" data-close-auth-modal></div>
    <section class="panel modal-panel auth-modal-panel">
      <div class="panel-header">
        <div>
          <p class="section-label">Login</p>
          <h2>Sign in with email</h2>
        </div>
        <button id="close-auth-modal" type="button" class="ghost-button">Close</button>
      </div>
      <div class="create-profile-grid">
        <label class="field">
          <span>Email</span>
          <input id="login-email" type="email" placeholder="you@example.com">
        </label>
        <label class="field">
          <span>Password</span>
          <input id="login-password" type="password" placeholder="Your password">
        </label>
        <button id="login-button" class="primary-button">Login</button>
      </div>
    </section>
  </div>
  <div id="signup-modal" class="modal-shell" hidden>
    <div class="modal-backdrop" data-close-signup-modal></div>
    <section class="panel modal-panel auth-modal-panel">
      <div class="panel-header">
        <div><p class="section-label">Sign Up</p><h2>Create your account</h2></div>
        <button id="close-signup-modal" type="button" class="ghost-button">Close</button>
      </div>
      <div class="create-profile-grid">
        <label class="field"><span>Username</span><input id="new-profile-name" type="text" placeholder="Choose a unique username"></label>
        <label class="field"><span>Email</span><input id="register-email" type="email" placeholder="you@example.com"></label>
        <input id="register-avatar-url" type="hidden">
        <label class="field"><span>Password</span><input id="register-password" type="password" placeholder="At least 8 characters"></label>
        <div class="hero-actions">
          <button id="create-profile-button" class="primary-button">Register</button>
          <button type="button" class="ghost-button" data-open-auth-modal>Login</button>
        </div>
      </div>
    </section>
  </div>

  <script src="./app.js?v=20260520d"></script>
</body>
</html>
